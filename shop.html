<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shop - Closure</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  letter-spacing: 0.5px;
  background: #0a0a0a;
  color: #f8f8f8;
}
  
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
}

.logo {
  font-weight: 600;
  letter-spacing: 2px;
  color: #d4af37;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

.products {
  padding: 50px;
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
  justify-content: center;
}

.product img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  border-radius: 10px;
  transition: 0.4s ease;
}

.product:hover img {
  transform: scale(1.05);
  opacity: 0.9;
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  background: transparent;
  color: #d4af37;
  border: 1px solid #d4af37;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  background: #d4af37;
  color: black;
}
</style>
</head>

<body>

<header>
  <div class="logo">Closure</div>
  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<div class="products">

  <div class="product">
   <img src="https://hourscollection.com/cdn/shop/files/DropShoulderHoodie-VintageBlack-ClipTag2_1000x.png?v=1762199711">
    <h3>Closure Hoodie</h3>
    <p>$60</p>
    <button onclick="window.location.href='https://yourshopifystore.com/product1'">
      Buy Now
    </button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Closure Tee</h3>
    <p>$35</p>
    <button onclick="window.location.href='https://yourshopifystore.com/product2'">
      Buy Now
    </button>
  </div>

</div>

</body>
</html>
