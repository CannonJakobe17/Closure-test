<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shop - Closure</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
}

.logo {
  color: #d4af37;
  font-size: 24px;
  font-weight: bold;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
}

.products {
  padding: 50px;
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
  justify-content: center;
}

.product {
  background: #111;
  padding: 15px;
  border-radius: 12px;
  width: 230px;
  transition: all 0.3s ease;
  overflow: hidden;
}

.product:hover {
  transform: translateY(-8px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
.product img {
  width: 100%;
  border-radius: 10px;
}

button {
  margin-top: 15px;
  padding: 12px 25px;
  background: transparent;
  color: #d4af37;
  border: 1px solid #d4af37;
  cursor: pointer;
  transition: all 0.3s ease;
}

button:hover {
  background: #d4af37;
  color: black;
}
</style>
</head>

<body>

<header>
  <div class="logo">Closure</div>
  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<div class="products">

  <div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Closure Hoodie</h3>
    <p>$60</p>
    <button onclick="window.location.href='https://yourshopifystore.com/product1'">
      Buy Now
    </button>
  </div>

  <div class="product">
    <img src="https://via.placeholder.com/200">
    <h3>Closure Tee</h3>
    <p>$35</p>
    <button onclick="window.location.href='https://yourshopifystore.com/product2'">
      Buy Now
    </button>
  </div>

</div>

</body>
</html>
