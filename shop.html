<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shop - Closure</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --shop-bg: url('https://lh7-rt.googleusercontent.com/docsz/AD_4nXf…4vGuooX-nqNpxqGhiFs8gQ?key=CUPhE2GHS05_BxQZlNiUMg');
}

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  background: #0a0a0a;
  color: white;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: transparent;
}

.logo {
  color: #d4af37;
  font-weight: 600;
  letter-spacing: 2px;
  font-size: 28px;
}

nav a {
  color: white;
  margin-left: 20px;
  text-decoration: none;
  font-weight: 400;
  transition: 0.3s ease;
}

nav a:hover {
  color: #d4af37;
}

.products {
  padding: 60px 40px;
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
  justify-content: center;
  background: var(--shop-bg) center/cover no-repeat;
}

.product {
  background: #111;
  padding: 15px;
  border-radius: 12px;
  width: 230px;
  transition: all 0.3s ease;
  overflow: hidden;
  text-align: center;
}

.product:hover {
  transform: translateY(-8px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.product img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  border-radius: 10px;
  transition: 0.4s ease;
}

.product:hover img {
  transform: scale(1.05);
  opacity: 0.9;
}

.product h3 {
  font-weight: 400;
  margin: 10px 0 5px;
}

.product p {
  color: #d4af37;
}

button {
  margin-top: 10px;
  padding: 10px;
  background: transparent;
  color: #d4af37;
  border: 1px solid #d4af37;
  cursor: pointer;
  border-radius: 5px;
  transition: all 0.3s ease;
}

button:hover {
  background: #d4af37;
  color: black;
}
</style>
</head>

<body>

<header>
  <div class="logo">Closure</div>
  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<div class="products">

  <div class="product">
    <img src="https://images.unsplash.com/photo-1623054861039-27257f0f920f?auto=format&fit=crop&w=800&q=80">
    <h3>Closure Hoodie</h3>
    <p>$60</p>
    <button onclick="window.location.href='https://yourshopifystore.com/product1'">Buy Now</button>
  </div>

  <div class="product">
    <img src="https://images.unsplash.com/photo-1614280229437-c7a29d4db0b0?auto=format&fit=crop&w=800&q=80">
    <h3>Closure Tee</h3>
    <p>$35</p>
    <button onclick="window.location.href='https://yourshopifystore.com/product2'">Buy Now</button>
  </div>

</div>

</body>
</html>
