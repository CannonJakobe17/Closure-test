<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Closure</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  letter-spacing: 0.5px;
  background: #0a0a0a;
  color: #f8f8f8;
}
/* NAVBAR */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: transparent;
}

.logo {
  font-weight: 600;
  letter-spacing: 2px;
  color: #d4af37;
}

nav a {
  color: #f8f8f8;
  text-decoration: none;
  margin-left: 20px;
}

/* HERO */
.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: url('https://images.unsplash.com/photo-1516826957135-700dedea698c') center/cover;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
}

.hero h1, .hero p, .hero button {
  position: relative;
  z-index: 1;
}
/* SECTION */
.section {
  padding: 80px 40px;
  text-align: center;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
}

.card {
  background: #111;
  padding: 25px;
  border-radius: 12px;
  width: 250px;
  transition: all 0.4s ease;
  border: 1px solid transparent;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  border: 1px solid #d4af37;
  box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  background: #111;
  margin-top: 40px;
}
</style>
</head>

<body>

<header>
  <div class="logo">Closure</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
  </nav>
</header>

<div class="hero">
  <h1>Closure</h1>
  <p>Everyone needs Closure from something.</p>
  <button onclick="location.href='shop.html'">Shop Now</button>
</div>

<div class="section">
  <h2>Featured Pieces</h2>
  <div class="cards">
    <div class="card">Premium Hoodies</div>
    <div class="card">Streetwear Sets</div>
    <div class="card">Accessories</div>
  </div>
</div>

<footer>
  <p>© 2026 Closure. All Rights Reserved.</p>
</footer>

</body>
</html>
