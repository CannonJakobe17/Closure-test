<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Closure</title>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --hero-bg: url('https://t3.ftcdn.net/jpg/01/04/94/88/360_F_104948871_xsXOz7JdVHtfgYgbRcrTaORTRCcUiKmV.jpg');
}

body {
  margin: 0;
  font-family: 'Montserrat', sans-serif;
  letter-spacing: 0.5px;
  background: #0a0a0a;
  color: #f8f8f8;
}

/* NAVBAR */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: transparent;
}

.logo {
  font-weight: 600;
  letter-spacing: 2px;
  color: #d4af37;
  font-size: 28px;
}

nav a {
  color: white;
  text-decoration: none;
  margin-left: 20px;
  font-weight: 400;
  transition: 0.3s ease;
}

nav a:hover {
  color: #d4af37;
}

/* HERO */
.hero {
  height: 90vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: var(--hero-bg) center/cover no-repeat;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
}

.hero h1, .hero p, .hero button {
  position: relative;
  z-index: 1;
  text-align: center;
}

.hero h1 {
  font-size: 60px;
  margin: 0;
  font-weight: 600;
}

.hero p {
  font-size: 18px;
  margin-top: 10px;
  color: #ddd;
}

/* SHOP NOW BUTTON */
.hero button {
  margin-top: 25px;
  padding: 14px 30px;
  border: 2px solid #d4af37;
  background: transparent;
  color: #d4af37;
  cursor: pointer;
  font-size: 18px;
  font-weight: 600;
  border-radius: 5px;
  transition: all 0.4s ease;
}

.hero button:hover {
  background: #d4af37;
  color: black;
  transform: scale(1.05) translateY(-3px);
  box-shadow: 0 8px 20px rgba(212,175,55,0.3);
}

/* FEATURE CARDS */
.section {
  padding: 80px 40px;
  text-align: center;
}

.cards {
  display: flex;
  justify-content: center;
  gap: 30px;
  flex-wrap: wrap;
}

.card {
  background: #111;
  padding: 25px;
  border-radius: 12px;
  width: 250px;
  transition: all 0.4s ease;
  border: 1px solid transparent;
}

.card:hover {
  transform: translateY(-10px) scale(1.02);
  border: 1px solid #d4af37;
  box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
}

/* FOOTER */
footer {
  text-align: center;
  padding: 30px;
  background: #111;
  margin-top: 40px;
  font-size: 14px;
  color: #aaa;
}

/* --- FADE-IN ANIMATION --- */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s ease-out, transform 0.8s ease-out;
}

.fade-in.visible {
  opacity: 1;
  transform: translateY(0);
}

/* --- STAGGER CARDS --- */
.cards .card {
  transition-delay: 0s;
}
.cards .card:nth-child(1) { transition-delay: 0.1s; }
.cards .card:nth-child(2) { transition-delay: 0.3s; }
.cards .card:nth-child(3) { transition-delay: 0.5s; }

</style>
</head>

<body>

<header>
  <div class="logo">Closure</div>
  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
  </nav>
</header>

<!-- HERO -->
<div class="hero fade-in">
  <h1>Closure</h1>
  <p>Everyone needs closure from something.</p>
  <button onclick="location.href='shop.html'">Shop Now</button>
</div>

<!-- FEATURED PIECES -->
<div class="section fade-in">
  <h2>Featured Pieces</h2>
  <div class="cards">
    <div class="card fade-in">Premium Hoodies</div>
    <div class="card fade-in">Streetwear Sets</div>
    <div class="card fade-in">Accessories</div>
  </div>
</div>

<footer>
  <p>© 2026 Closure. All Rights Reserved.</p>
</footer>

<!-- SCROLL FADE-IN SCRIPT -->
<script>
const faders = document.querySelectorAll('.fade-in');

const appearOptions = {
  threshold: 0.2,
  rootMargin: "0px 0px -50px 0px"
};

const appearOnScroll = new IntersectionObserver(function(entries, observer){
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, appearOptions);

faders.forEach(fader => {
  appearOnScroll.observe(fader);
});
</script>

</body>
</html>
